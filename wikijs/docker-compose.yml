version: "3"
services:
  db:
    image: postgres:11-alpine
    container_name: postgresql
    environment:
    - TZ=Asia/Shanghai
    - POSTGRES_DB=wiki
    - POSTGRES_PASSWORD=wikijsrocks
    - POSTGRES_USER=wikijs
    logging:
      driver: "none"
    restart: unless-stopped
    volumes:
      - ./data/db:/var/lib/postgresql/data
  wiki:
    image: ghcr.io/requarks/wiki:2
    container_name: wiki
    depends_on:
      - db
    environment:
    - TZ=Asia/Shanghai
    - DB_TYPE=postgres
    - DB_HOST=db
    - DB_PORT=5432
    - DB_USER=wikijs
    - DB_PASS=wikijsrocks
    - DB_NAME=wiki
    restart: unless-stopped
    ports:
      - "80:3000"
  bind9:
    image: internetsystemsconsortium/bind9:9.18
    network_mode: "host"
    environment:
      TZ: Asia/Shanghai
    restart: unless-stopped
    volumes:
    - ./config/bind9/named.conf.options:/etc/bind/named.conf.options
    - ./config/bind9/named.conf.default-zones:/etc/bind/named.conf.default-zones
    - ./config/bind9/db.itjinfuyun.com:/etc/bind/db.itjinfuyun.com