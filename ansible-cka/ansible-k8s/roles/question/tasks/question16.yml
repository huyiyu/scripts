---
# Question 16 | cri-dockerd
# 题目：安装 cri-dockerd 并配置系统参数
# 仅在 cluster3 上执行
# 注意：cri-dockerd 是系统级组件，无需 namespace
# 注意：不修改 kubelet 运行时配置（保持 containerd）

- name: "检查 Question 16 是否在 cluster3 上运行"
  fail:
    msg: "Question 16 只能在 cluster3 上部署"
  when: "'cluster3' not in group_names"

# ==========================================
# 1. 创建考生用户（需要 sudo -i 权限）
# ==========================================
- name: "创建 {{ question16_student_user | default('cka000016') }} 系统用户"
  user:
    name: "{{ question16_student_user | default('cka000016') }}"
    state: present
    create_home: yes
    shell: /bin/bash

- name: "授予 {{ question16_student_user | default('cka000016') }} sudo 权限（cri-dockerd 安装需要）"
  copy:
    content: |
      # CKA Q16 - cri-dockerd 安装
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/kubectl
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/local/bin/kubectl
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/local/bin/crictl
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /bin/systemctl
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/journalctl
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/apt
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/apt-get
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/dpkg
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/vim /var/lib/kubelet/config.yaml
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/vi /var/lib/kubelet/config.yaml
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /bin/cp /home/{{ question16_student_user | default('cka000016') }}/cri-dockerd.deb
      {{ question16_student_user | default('cka000016') }} ALL=(ALL) NOPASSWD: /usr/bin/cp /home/{{ question16_student_user | default('cka000016') }}/cri-dockerd.deb
    dest: "/etc/sudoers.d/{{ question16_student_user | default('cka000016') }}"
    mode: '0440'
    validate: 'visudo -cf %s'

- name: 复制 cri-dockerd
  copy:
    src: "{{ offline_packages_path }}/k8s/cri-dockerd_0.3.24.3-0.debian-bookworm_amd64.deb"
    dest: "{{ question16_student_home | default('/home/cka000016') }}/cri-dockerd_0.3.24.3-0.debian-bookworm_amd64.deb"
    mode: '0644'
    owner: cka000016
    group: cka000016
    remote_src: yes
  ignore_errors: yes

# ==========================================
# 4. 安装 crictl
# ==========================================
- name: "检查离线包目录是否存在 crictl"
  stat:
    path: "{{ offline_packages_path }}/k8s/crictl-v1.34.0-linux-amd64.tar.gz"
  register: crictl_package

- name: "解压安装 crictl"
  unarchive:
    src: "{{ offline_packages_path }}/k8s/crictl-v1.34.0-linux-amd64.tar.gz"
    dest: "/usr/local/bin"
    remote_src: yes
    mode: '0755'
  when: crictl_package.stat.exists
