---
# Question 3 | Sidecar
# 题目：更新 synergy-leverager Deployment，添加 sidecar 容器读取日志
# 仅在 cluster1 上执行

- name: "检查 Question 3 是否在 cluster1 上运行"
  fail:
    msg: "Question 3 只能在 cluster1 上部署"
  when: "'cluster1' not in group_names"

# ==========================================
# 1. 创建考生用户（使用统一管理模块）
# ==========================================
- name: "创建/复用考生用户"
  import_tasks: manage-student-user.yml
  vars:
    student_namespace: "{{ question3_namespace | default('default') }}"
    student_user: "{{ question3_student_user | default('cka000003') }}"
    student_home: "{{ question3_student_home | default('/home/cka-default') }}"

# ==========================================
# 2. 创建题目所需的 K8s 资源
# ==========================================
- name: "创建临时目录存放 YAML 文件"
  file:
    path: "/tmp/question3-manifests"
    state: directory
    mode: '0755'

- name: "生成 synergy-leverager Deployment YAML"
  template:
    src: question3/synergy-leverager-deployment.yaml.j2
    dest: /tmp/question3-manifests/synergy-leverager-deployment.yaml
    mode: '0644'

- name: "应用 YAML 文件"
  shell: kubectl apply -f /tmp/question3-manifests/
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: apply_result
  changed_when: "'created' in apply_result.stdout or 'configured' in apply_result.stdout"

- name: "等待 synergy-leverager Deployment 就绪"
  shell: |
    kubectl wait --for=condition=available deployment/synergy-leverager -n {{ question3_namespace | default('default') }} --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: yes
  changed_when: false


