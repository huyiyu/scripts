---
# Question 9 | Gateway API
# 题目：将现有的 Ingress 迁移到 Gateway API
# 基础设施（Gateway API CRDs、GatewayClass、web 应用、Ingress）已在 question9-infra.yml 中部署
# 这里只需创建考生用户

- name: "检查 Question 9 是否在 cluster1 上运行"
  fail:
    msg: "Question 9 只能在 cluster1 上部署"
  when: "'cluster1' not in group_names"

# ==========================================
# 1. 创建考生用户
# ==========================================
- name: "创建/复用考生用户"
  import_tasks: manage-student-user.yml
  vars:
    student_namespace: "{{ question9_namespace | default('default') }}"
    student_user: "{{ question9_student_user | default('cka000009') }}"
    student_home: "{{ question9_student_home | default('/home/cka000009') }}"
