---
# 初始化 CKA 考试环境
# 1. 生成 ed25519 SSH 密钥对
# 2. 将公钥分发到所有 CKA 用户
# 注意：私钥和 SSH config 显示在 show_ssh_info.yml 中最后执行

# ==========================================
# 1. 生成 ed25519 SSH 密钥对（在控制节点上）
# ==========================================
- name: "检查是否已存在 CKA SSH 密钥"
  stat:
    path: /root/.ssh/cka_ed25519
  register: cka_key_stat
  delegate_to: localhost
  become: yes
  run_once: true

- name: "生成 ed25519 SSH 密钥对"
  shell: |
    ssh-keygen -t ed25519 -f /root/.ssh/cka_ed25519 -N "" -C "cka-exam-key"
  args:
    creates: /root/.ssh/cka_ed25519
  delegate_to: localhost
  become: yes
  run_once: true
  when: not cka_key_stat.stat.exists

- name: "读取公钥内容"
  slurp:
    src: /root/.ssh/cka_ed25519.pub
  register: cka_public_key
  delegate_to: localhost
  become: yes
  run_once: true

- name: "设置公钥变量"
  set_fact:
    cka_ssh_public_key: "{{ cka_public_key.content | b64decode | trim }}"
  run_once: true

# ==========================================
# 2. 导入 CKA 题目镜像
# ==========================================
- name: 复制 CKA 题目镜像包到目标节点
  copy:
    src: "{{ offline_images_path }}/{{ cka_images_package }}"
    dest: "/tmp/{{ cka_images_package }}"
    mode: '0644'
    remote_src: yes
  when: cka_images_tar.stat.exists | default(false)

- name: 导入 CKA 题目镜像到 containerd
  shell: |
    ctr -n k8s.io images import /tmp/{{ cka_images_package }}
  when: cka_images_tar.stat.exists | default(false)
  ignore_errors: yes


- name: 列出已导入的 CKA 题目镜像
  shell: |
    ctr -n k8s.io images list | grep -E "(traefik|local-path-provisioner|busybox|echoserver|httpd)" || true
  register: imported_cka_images
  changed_when: false

- name: 显示已导入的 CKA 题目镜像
  debug:
    msg: "{{ imported_cka_images.stdout_lines }}"
