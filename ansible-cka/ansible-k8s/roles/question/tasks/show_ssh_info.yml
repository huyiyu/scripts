---
# 显示 CKA SSH 信息
# 生成配置文件并显示，便于用户复制

# ==========================================
# 读取密钥内容
# ==========================================
- name: "读取私钥内容"
  slurp:
    src: /root/.ssh/cka_ed25519
  register: cka_private_key
  delegate_to: localhost
  become: yes
  run_once: true

- name: "读取公钥内容"
  slurp:
    src: /root/.ssh/cka_ed25519.pub
  register: cka_public_key
  delegate_to: localhost
  become: yes
  run_once: true

- name: "设置密钥变量"
  set_fact:
    cka_ssh_private_key: "{{ cka_private_key.content | b64decode }}"
    cka_ssh_public_key: "{{ cka_public_key.content | b64decode | trim }}"
  run_once: true

- name: "生成 SSH config 文件内容"
  set_fact:
    ssh_config_content: |
      # Question 1 (cluster1)
      Host cka000001
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000001
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 2 (cluster1)
      Host cka000002
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000002
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 3 (cluster1)
      Host cka000003
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000003
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 4 (cluster1)
      Host cka000004
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000004
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 5 (cluster1)
      Host cka000005
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000005
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 6 (cluster1)
      Host cka000006
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000006
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 7 (cluster1)
      Host cka000007
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000007
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 8 (cluster1)
      Host cka000008
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000008
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 9 (cluster1)
      Host cka000009
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000009
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 10 (cluster1)
      Host cka000010
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000010
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 11 (cluster1)
      Host cka000011
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000011
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 12 (cluster1)
      Host cka000012
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000012
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 14 (cluster1)
      Host cka000014
          HostName {{ hostvars[groups['cluster1'][0]]['ansible_host'] }}
          User cka000014
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 13 (cluster2)
      Host cka000013
          HostName {{ hostvars[groups['cluster2'][0]]['ansible_host'] }}
          User cka000013
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 15 (cluster3)
      Host cka000015
          HostName {{ hostvars[groups['cluster3'][0]]['ansible_host'] }}
          User cka000015
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no

      # Question 16 (cluster3)
      Host cka000016
          HostName {{ hostvars[groups['cluster3'][0]]['ansible_host'] }}
          User cka000016
          IdentityFile ~/.ssh/cka_ed25519
          StrictHostKeyChecking no
  run_once: true

# ==========================================
# 生成汇总文件到控制节点
# ==========================================
- name: "创建 CKA SSH 信息目录"
  file:
    path: /root/cka-ssh-info
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: yes
  run_once: true

- name: "生成 SSH 私钥文件（供下载）"
  copy:
    content: "{{ cka_ssh_private_key }}"
    dest: /root/cka-ssh-info/cka_ed25519
    mode: '0600'
  delegate_to: localhost
  become: yes
  run_once: true

- name: "生成 SSH 公钥文件"
  copy:
    content: "{{ cka_ssh_public_key }}"
    dest: /root/cka-ssh-info/cka_ed25519.pub
    mode: '0644'
  delegate_to: localhost
  become: yes
  run_once: true

- name: "生成 SSH config 文件"
  copy:
    content: "{{ ssh_config_content }}"
    dest: /root/cka-ssh-info/ssh_config
    mode: '0644'
  delegate_to: localhost
  become: yes
  run_once: true

# ==========================================
# 显示汇总信息（使用 shell cat 避免 Ansible 的列表格式）
# ==========================================
- name: "显示分隔线"
  debug:
    msg: "================================================================================"
  run_once: true

- name: "显示标题"
  debug:
    msg: "                           CKA 考试环境 SSH 密钥信息"
  run_once: true

- name: "显示分隔线"
  debug:
    msg: "================================================================================"
  run_once: true

- name: "显示文件路径信息"
  debug:
    msg: |
      【文件位置】
      私钥: /root/.ssh/cka_ed25519
      公钥: /root/.ssh/cka_ed25519.pub
      
      【可复制文件位置】
      /root/cka-ssh-info/cka_ed25519
      /root/cka-ssh-info/cka_ed25519.pub
      /root/cka-ssh-info/ssh_config
  run_once: true

- name: "显示分隔线"
  debug:
    msg: "================================================================================"
  run_once: true

- name: "显示私钥标题"
  debug:
    msg: "【私钥内容 - 复制到 ~/.ssh/cka_ed25519】"
  run_once: true

- name: "显示私钥内容"
  command: cat /root/.ssh/cka_ed25519
  delegate_to: localhost
  become: yes
  run_once: true
  changed_when: false

- name: "显示分隔线"
  debug:
    msg: "================================================================================"
  run_once: true

- name: "显示公钥标题"
  debug:
    msg: "【公钥内容】"
  run_once: true

- name: "显示公钥内容"
  command: cat /root/.ssh/cka_ed25519.pub
  delegate_to: localhost
  become: yes
  run_once: true
  changed_when: false

- name: "显示分隔线"
  debug:
    msg: "================================================================================"
  run_once: true

- name: "显示 SSH config 标题"
  debug:
    msg: "【SSH Config - 复制到 ~/.ssh/config】"
  run_once: true

- name: "显示 SSH config 内容"
  command: cat /root/cka-ssh-info/ssh_config
  delegate_to: localhost
  become: yes
  run_once: true
  changed_when: false

- name: "显示分隔线"
  debug:
    msg: "================================================================================"
  run_once: true

- name: "显示使用说明"
  debug:
    msg: |
      【快速使用方法】
      
      1. 保存私钥:
         cp /root/cka-ssh-info/cka_ed25519 ~/.ssh/
         chmod 600 ~/.ssh/cka_ed25519
      
      2. 保存 SSH config:
         cp /root/cka-ssh-info/ssh_config ~/.ssh/config
      
      3. 连接示例:
         ssh cka000001    # Question 1
         ssh cka000002    # Question 2
         ssh cka000013    # Question 13 (cluster2)
         ssh cka000015    # Question 15 (cluster3)
      
      或者直接使用:
         ssh -i ~/.ssh/cka_ed25519 cka000001@<IP>
  run_once: true

- name: "显示分隔线"
  debug:
    msg: "================================================================================"
  run_once: true
