---
# Question 5 | Service
# 题目：重新配置 front-end Deployment 公开端口，创建 NodePort Service
# 仅在 cluster1 上执行

- name: "检查 Question 5 是否在 cluster1 上运行"
  fail:
    msg: "Question 5 只能在 cluster1 上部署"
  when: "'cluster1' not in group_names"

# ==========================================
# 1. 创建考生用户（使用统一管理模块）
# ==========================================
- name: "创建/复用考生用户"
  import_tasks: manage-student-user.yml
  vars:
    student_namespace: "{{ question5_namespace | default('spline-reticulator') }}"
    student_user: "{{ question5_student_user | default('cka-spline-reticulator') }}"
    student_home: "{{ question5_student_home | default('/home/cka-spline-reticulator') }}"

# ==========================================
# 2. 创建题目所需的 K8s 资源
# ==========================================
- name: "创建临时目录存放 YAML 文件"
  file:
    path: "/tmp/question5-manifests"
    state: directory
    mode: '0755'

- name: "生成 front-end Deployment YAML"
  template:
    src: question5/frontend-deployment.yaml.j2
    dest: /tmp/question5-manifests/frontend-deployment.yaml
    mode: '0644'

- name: "应用 YAML 文件"
  shell: kubectl apply -f /tmp/question5-manifests/
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: apply_result
  changed_when: "'created' in apply_result.stdout or 'configured' in apply_result.stdout"

- name: "等待 front-end Deployment 就绪"
  shell: |
    kubectl wait --for=condition=available deployment/front-end -n {{ question5_namespace | default('spline-reticulator') }} --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  ignore_errors: yes
  changed_when: false


