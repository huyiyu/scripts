; CKA 2026 考试环境 - Ansible Inventory
; 根据你的VMware虚拟机IP地址修改以下配置

[controlplane]
192.168.56.10 ansible_hostname=controlplane

[workers]
192.168.56.11 ansible_hostname=node01
192.168.56.12 ansible_hostname=node02

[k8s_cluster:children]
controlplane
workers

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

; Kubernetes 版本配置 (CKA 2026考试使用 v1.30+)
kubernetes_version=1.30.0
pod_network_cidr=10.244.0.0/16
service_cidr=10.96.0.0/12
