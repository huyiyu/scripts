---
# 安装 Kubernetes 组件

- name: 添加 Kubernetes apt 密钥
  apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
    keyring: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  ignore_errors: yes

- name: 创建 apt keyrings 目录
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: 下载 Kubernetes apt 密钥
  shell: |
    curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: 添加 Kubernetes apt 仓库
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
    state: present
    filename: kubernetes

- name: 更新 apt 缓存
  apt:
    update_cache: yes

- name: 安装 Kubernetes 组件
  apt:
    name:
      - kubelet=1.30.0-1.1
      - kubeadm=1.30.0-1.1
      - kubectl=1.30.0-1.1
    state: present
    update_cache: yes

- name: 固定 Kubernetes 版本 (防止自动更新)
  shell: |
    apt-mark hold kubelet kubeadm kubectl

- name: 启用 kubelet 服务
  systemd:
    name: kubelet
    enabled: yes
    state: started

- name: 配置 kubectl 自动补全
  shell: |
    kubectl completion bash | sudo tee /etc/bash_completion.d/kubectl > /dev/null
    echo 'alias k=kubectl' >> /etc/bash.bashrc
    echo 'complete -o default -F __start_kubectl k' >> /etc/bash.bashrc
