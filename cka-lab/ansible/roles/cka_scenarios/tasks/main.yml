---
# CKA 2026 考试题目场景创建
# 严格按照 cka202602.md 中的 16 道题目原封不动创建

# ============================================
# 基础命名空间创建
# ============================================
- name: 创建考试题目命名空间
  shell: |
    kubectl create namespace {{ item }} --dry-run=client -o yaml | kubectl apply -f -
  loop:
    - autoscale
    - sound-repeater
    - spline-reticulator
    - priority
    - mariadb
    - nginx-static
    - relative-fawn
    - backend
    - frontend
  ignore_errors: yes

# ============================================
# Question 1 | HPA autoscale
# ============================================
- name: Q1 - 创建 HPA 题目 Deployment
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: apache-server
      namespace: autoscale
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: apache-server
      template:
        metadata:
          labels:
            app: apache-server
        spec:
          containers:
          - name: apache
            image: httpd:2.4-alpine
            ports:
            - containerPort: 80
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
    EOF

# ============================================
# Question 2 | Ingress
# ============================================
- name: Q2 - 创建 Ingress 题目资源
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: echoserver
      namespace: sound-repeater
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: echoserver
      template:
        metadata:
          labels:
            app: echoserver
        spec:
          containers:
          - name: echoserver
            image: httpd:2.4-alpine
            ports:
            - containerPort: 8080
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: echoserver-service
      namespace: sound-repeater
    spec:
      selector:
        app: echoserver
      ports:
      - port: 8080
        targetPort: 8080
    EOF

# ============================================
# Question 3 | sidecar
# ============================================
- name: Q3 - 创建 Sidecar 题目 Deployment
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: synergy-leverager
      namespace: default
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: synergy-leverager
      template:
        metadata:
          labels:
            app: synergy-leverager
        spec:
          containers:
          - name: synergy-leverager
            image: busybox:stable
            args:
            - /bin/sh
            - -c
            - |
              i=0; while true; do
                echo "\$(date) INFO \$i" >> /var/log/synergy-leverager.log;
                i=\$((i+1));
                sleep 5;
              done
            volumeMounts:
            - name: logdir
              mountPath: /var/log
          volumes:
          - name: logdir
            emptyDir: {}
    EOF

# ============================================
# Question 4 | StorageClass
# ============================================
- name: Q4 - 创建 ran-local-path StorageClass
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: ran-local-path
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
    provisioner: rancher.io/local-path
    volumeBindingMode: WaitForFirstConsumer
    EOF

# ============================================
# Question 5 | Service
# ============================================
- name: Q5 - 创建 Service 题目资源
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: front-end
      namespace: spline-reticulator
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: front-end
      template:
        metadata:
          labels:
            app: front-end
        spec:
          containers:
          - name: nginx
            image: httpd:2.4-alpine
    EOF

# ============================================
# Question 6 | PriorityClass
# ============================================
- name: Q6 - 创建 PriorityClass 题目资源
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: scheduling.k8s.io/v1
    kind: PriorityClass
    metadata:
      name: max-user-priority
    value: 1000000000
    globalDefault: false
    description: "Max user priority"
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: busybox-logger
      namespace: priority
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: busybox-logger
      template:
        metadata:
          labels:
            app: busybox-logger
        spec:
          containers:
          - name: logger
            image: busybox:stable
            command: ["sh", "-c", "while true; do echo \$(date); sleep 10; done"]
    EOF

# ============================================
# Question 7 | Helm ArgoCD
# ============================================
- name: Q7 - 安装 Helm
  shell: |
    if ! command -v helm &> /dev/null; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
  ignore_errors: yes

# ============================================
# Question 8 | PVC
# ============================================
- name: Q8 - 创建 PVC 题目资源
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: v1
    kind: PersistentVolume
    metadata:
      name: mariadb-pv
    spec:
      capacity:
        storage: 500Mi
      accessModes:
      - ReadWriteOnce
      storageClassName: local-path
      hostPath:
        path: /mnt/mariadb-data
    EOF

- name: Q8 - 创建 mariadb 数据目录
  file:
    path: /mnt/mariadb-data
    state: directory
    mode: '0755'

# ============================================
# Question 9 | Gateway
# ============================================
- name: Q9 - 创建 Gateway 题目资源
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: web
      namespace: default
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: web
      template:
        metadata:
          labels:
            app: web
        spec:
          containers:
          - name: web
            image: nginx:alpine
            ports:
            - containerPort: 80
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: web
      namespace: default
    spec:
      selector:
        app: web
      ports:
      - port: 80
        targetPort: 80
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: web
      namespace: default
    spec:
      ingressClassName: nginx
      rules:
      - host: ingress.web.k8s.local
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
    ---
    apiVersion: v1
    kind: Secret
    metadata:
      name: web-cert
      namespace: default
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0tCk1JSUV2Z0lCQURBTkJna3Foa2lHOXcwQkFRRUZBQVNDQktnd2dnU2tBZ0VBQW9JQkFRQ3Rlc3RrZXlkYXRhCi0tLS0tRU5EIFBSSVZBVEUgS0VZLS0tLS0K
    EOF

# ============================================
# Question 10 | NetworkPolicy
# ============================================
- name: Q10 - 创建 NetworkPolicy 题目资源
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend
      namespace: backend
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: backend
      template:
        metadata:
          labels:
            app: backend
        spec:
          containers:
          - name: nginx
            image: nginx:alpine
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: frontend
      namespace: frontend
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: frontend
      template:
        metadata:
          labels:
            app: frontend
        spec:
          containers:
          - name: nginx
            image: nginx:alpine
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: backend
      namespace: backend
    spec:
      selector:
        app: backend
      ports:
      - port: 80
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: frontend
      namespace: frontend
    spec:
      selector:
        app: frontend
      ports:
      - port: 80
    EOF

# ============================================
# Question 11 | CRD
# ============================================
- name: Q11 - 安装 cert-manager
  shell: |
    kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.0/cert-manager.yaml
  ignore_errors: yes

# ============================================
# Question 12 | ConfigMap
# ============================================
- name: Q12 - 创建 nginx-static 题目资源
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: nginx-config
      namespace: nginx-static
    data:
      nginx.conf: |
        server {
          listen 443 ssl;
          server_name web.k8snginx.local;
          ssl_certificate /etc/nginx/ssl/tls.crt;
          ssl_certificate_key /etc/nginx/ssl/tls.key;
          ssl_protocols TLSv1.1 TLSv1.2;
          ssl_ciphers 'ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384';
          ssl_prefer_server_ciphers on;
          location / {
            root /usr/share/nginx/html;
            index index.html;
          }
        }
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-static
      namespace: nginx-static
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: nginx-static
      template:
        metadata:
          labels:
            app: nginx-static
        spec:
          containers:
          - name: nginx
            image: nginx:alpine
            volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
            - name: ssl
              mountPath: /etc/nginx/ssl
          volumes:
          - name: config
            configMap:
              name: nginx-config
          - name: ssl
            secret:
              secretName: web-cert
    EOF

# ============================================
# Question 13 | Calico
# ============================================
# 已在 addons 角色中安装 Calico，此处标记为已完成

# ============================================
# Question 14 | Resources
# ============================================
- name: Q14 - 创建 Resources 题目资源
  shell: |
    cat <<EOF | kubectl apply -f -
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: wordpress
      namespace: relative-fawn
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: wordpress
      template:
        metadata:
          labels:
            app: wordpress
        spec:
          containers:
          - name: wordpress
            image: busybox:stable
            command: ["sh", "-c", "while true; do sleep 10; done"]
            resources:
              requests:
                cpu: 500m
                memory: 1Gi
    EOF

# ============================================
# 部署辅助脚本
# ============================================
- name: 部署 CKA 辅助脚本
  include_tasks: scripts.yml
