---
# 安装 Kubernetes 插件

# ============================================
# 安装 Metrics Server (用于 HPA 和 top 命令)
# ============================================
- name: 安装 Metrics Server
  shell: |
    kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  ignore_errors: yes

- name: 修改 Metrics Server 配置 - 允许 insecure
  shell: |
    kubectl patch deployment metrics-server -n kube-system --type='json' -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'
  ignore_errors: yes

# ============================================
# 安装 Helm
# ============================================
- name: 下载 Helm 安装脚本
  get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get_helm.sh
    mode: '0755'

- name: 安装 Helm
  shell: /tmp/get_helm.sh
  args:
    creates: /usr/local/bin/helm

- name: 配置 Helm 自动补全
  shell: |
    helm completion bash | tee /etc/bash_completion.d/helm > /dev/null

# ============================================
# 安装 Ingress Nginx Controller
# ============================================
- name: 安装 Ingress Nginx
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/baremetal/deploy.yaml
  ignore_errors: yes

# ============================================
# 安装 Gateway API CRDs
# ============================================
- name: 安装 Gateway API CRDs
  shell: |
    kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.0.0/standard-install.yaml
  ignore_errors: yes

# ============================================
# 安装本地路径存储类 (local-path-provisioner)
# ============================================
- name: 安装 local-path-provisioner
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.26/deploy/local-path-storage.yaml
  ignore_errors: yes

- name: 设置 local-path 为默认 StorageClass
  shell: |
    kubectl patch storageclass local-path -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
  ignore_errors: yes
