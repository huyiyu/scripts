---
# 安装 Calico CNI - 支持 NetworkPolicy

- name: 检查 Calico 是否已安装
  shell: kubectl get pods -n kube-system | grep calico || true
  register: calico_check
  changed_when: false

- name: 下载 Calico 清单文件
  get_url:
    url: https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/tigera-operator.yaml
    dest: /tmp/tigera-operator.yaml
    mode: '0644'
  when: "'calico' not in calico_check.stdout"

- name: 下载 Calico 自定义资源
  get_url:
    url: https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/custom-resources.yaml
    dest: /tmp/custom-resources.yaml
    mode: '0644'
  when: "'calico' not in calico_check.stdout"

- name: 修改 Calico 配置 - 使用正确的 Pod CIDR
  replace:
    path: /tmp/custom-resources.yaml
    regexp: 'cidr: 192.168.0.0/16'
    replace: 'cidr: {{ pod_network_cidr | default("10.244.0.0/16") }}'
  when: "'calico' not in calico_check.stdout"

- name: 安装 Tigera Operator
  shell: kubectl create -f /tmp/tigera-operator.yaml
  when: "'calico' not in calico_check.stdout"
  ignore_errors: yes

- name: 等待 Operator 就绪
  pause:
    seconds: 10
  when: "'calico' not in calico_check.stdout"

- name: 安装 Calico
  shell: kubectl create -f /tmp/custom-resources.yaml
  when: "'calico' not in calico_check.stdout"
  ignore_errors: yes

- name: 等待 Calico 启动
  shell: |
    kubectl rollout status deployment/calico-kube-controllers -n calico-system --timeout=300s || true
  ignore_errors: yes
