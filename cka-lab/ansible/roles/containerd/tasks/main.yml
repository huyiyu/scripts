---
# 安装 containerd - Kubernetes 容器运行时

- name: 安装 containerd
  apt:
    name: containerd
    state: present

- name: 创建 containerd 配置目录
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: 生成默认 containerd 配置
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: 修改 containerd 配置 - 使用 systemd cgroup
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'

- name: 配置 sandbox_image 使用国内镜像 (可选)
  replace:
    path: /etc/containerd/config.toml
    regexp: 'sandbox_image = "registry.k8s.io/pause:3.8"'
    replace: 'sandbox_image = "registry.aliyuncs.com/google_containers/pause:3.9"'
  ignore_errors: yes

- name: 重启 containerd 服务
  systemd:
    name: containerd
    state: restarted
    enabled: yes
    daemon_reload: yes
