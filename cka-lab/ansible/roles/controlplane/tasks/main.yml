---
# 初始化 Kubernetes Control Plane

- name: 检查集群是否已初始化
  stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_admin_conf

- name: 初始化 Kubernetes 集群
  shell: |
    kubeadm init \
      --pod-network-cidr={{ pod_network_cidr | default('10.244.0.0/16') }} \
      --service-cidr={{ service_cidr | default('10.96.0.0/12') }} \
      --apiserver-advertise-address={{ ansible_default_ipv4.address }} \
      --node-name={{ ansible_hostname }}
  when: not k8s_admin_conf.stat.exists
  register: kubeadm_init

- name: 创建 .kube 目录
  file:
    path: /home/{{ ansible_user }}/.kube
    state: directory
    mode: '0755'
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: 复制 admin.conf 到用户目录
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/{{ ansible_user }}/.kube/config
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: 为 root 用户配置 kubectl
  file:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    state: link
    force: yes

- name: 生成 join 命令
  shell: kubeadm token create --print-join-command
  register: kubeadm_join_command
  when: kubeadm_init is succeeded or k8s_admin_conf.stat.exists

- name: 保存 join 命令到文件
  copy:
    content: "{{ kubeadm_join_command.stdout }}"
    dest: /tmp/kubeadm-join-command.sh
    mode: '0755'
  when: kubeadm_join_command is defined

- name: 获取 join 命令
  slurp:
    src: /tmp/kubeadm-join-command.sh
  register: join_command_file

- name: 设置 join 命令 fact
  set_fact:
    k8s_join_command: "{{ join_command_file.content | b64decode }}"
