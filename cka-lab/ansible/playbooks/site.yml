---
# CKA 2026 考试环境完整部署 Playbook
# 严格按照 cka202602.md 中的 16 道题目创建

- name: "CKA Lab - 基础环境准备"
  hosts: all
  become: yes
  roles:
    - common
    - containerd
    - kubernetes

- name: "CKA Lab - 初始化 Control Plane"
  hosts: controlplane
  become: yes
  roles:
    - controlplane
    - cni
    - addons

- name: "CKA Lab - Worker 节点加入集群"
  hosts: workers
  become: yes
  roles:
    - worker

- name: "CKA Lab - 创建考试题目场景 (cka202602.md)"
  hosts: controlplane
  become: yes
  roles:
    - cka_scenarios
